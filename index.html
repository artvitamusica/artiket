<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Validador Pro - Art Vita</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #26183C; color: white; text-align: center; margin: 0; overflow: hidden; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100%; }
        
        /* Contenedor del escáner */
        #reader { width: 100% !important; max-width: 400px; border: none !important; }
        #reader video { border-radius: 20px; object-fit: cover; }
        
        /* Estilos de la tarjeta de login */
        .login-card { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; backdrop-filter: blur(10px); width: 80%; max-width: 300px; }
        input { padding: 15px; font-size: 1.5rem; width: 80%; border-radius: 10px; border: none; text-align: center; margin: 20px 0; }
        
        .btn { background: #fff; color: #26183C; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }
        
        /* Overlay y mensajes */
        #info { position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); width: 80%; max-width: 350px; padding: 20px; border-radius: 15px; font-weight: bold; display: none; z-index: 100; }
        .success { background: #27ae60; border: 2px solid white; }
        .error { background: #c0392b; border: 2px solid white; }
        .used { background: #f39c12; border: 2px solid white; }
        
        #btnNext { display: none; position: fixed; top: 20px; right: 20px; background: #27ae60; color: white; padding: 10px 20px; border-radius: 8px; z-index: 101; font-weight: bold; border: none; }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-area" class="login-card">
            <h2>ART VITA</h2>
            <p>PIN DEL EVENTO</p>
            <input type="password" id="pinInput" inputmode="numeric" maxlength="4">
            <button class="btn" onclick="conectarEvento()">INGRESAR</button>
        </div>

        <div id="scanner-area" style="display:none; width: 100%;">
            <div id="reader"></div>
            <button id="btnNext" onclick="resetScanner()">SIGUIENTE</button>
            <p id="event-name" style="margin-top: 10px; opacity: 0.7;"></p>
        </div>
    </div>

    <div id="info"></div>

    <script>
        const MASTER_URL = "https://script.google.com/macros/s/AKfycbyswVc2KwgekG7-vRzOw18fHJDoaeA8IHq86diH2vHfzZ7vvN7xS_5yzmZ7eI4_LiweGg/exec"; // La de la planilla con los PINs
        let EVENT_URL = "";
        let html5QrCode;
        let isProcessing = false;

        function conectarEvento() {
            const pin = document.getElementById("pinInput").value;
            fetch(`${MASTER_URL}?pin=${pin}`)
                .then(r => r.json())
                .then(data => {
                    if (data.status === "success") {
                        EVENT_URL = data.scriptUrl;
                        document.getElementById("event-name").innerText = data.eventName;
                        document.getElementById("login-area").style.display = "none";
                        document.getElementById("scanner-area").style.display = "block";
                        startScanner();
                    } else { alert("PIN Inválido"); }
                });
        }

        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            const config = { 
                fps: 15, // Optimización de FPS
                qrbox: { width: 250, height: 250 }, // Overlay guía
                aspectRatio: 1.0 // Cuadrado para mejor enfoque
            };

            html5QrCode.start(
                { facingMode: "environment" }, 
                config,
                (decodedText) => {
                    if (!isProcessing) {
                        isProcessing = true;
                        validarTicket(decodedText);
                    }
                }
            );
        }

        function validarTicket(codigo) {
            const info = document.getElementById("info");
            info.style.display = "block";
            info.innerText = "VERIFICANDO...";
            info.className = "";

            fetch(`${EVENT_URL}?code=${codigo}`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById("btnNext").style.display = "block";
                    if (data.status === "success") {
                        info.innerText = "✅ ACCESO: " + data.nombre;
                        info.className = "success";
                    } else if (data.status === "used") {
                        info.innerText = "❌ YA USADA: " + data.nombre;
                        info.className = "used";
                    } else {
                        info.innerText = "❌ INVÁLIDO";
                        info.className = "error";
                    }
                });
        }

        function resetScanner() {
            isProcessing = false;
            document.getElementById("btnNext").style.display = "none";
            document.getElementById("info").style.display = "none";
        }
    </script>
</body>
</html>
