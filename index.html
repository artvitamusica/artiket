<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Validador Art Vita</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #26183C; color: white; text-align: center; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { width: 90%; max-width: 400px; padding: 20px; }
        #video { width: 100%; border-radius: 20px; border: 3px solid white; display: none; background: black; margin-top: 15px; }
        input { padding: 15px; font-size: 1.5rem; width: 100%; max-width: 200px; border-radius: 10px; border: none; text-align: center; margin: 20px 0; background: #fff; color: #26183C; }
        .btn { background: #fff; color: #26183C; border: none; padding: 15px 40px; border-radius: 10px; font-weight: bold; font-size: 1.1rem; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn:active { transform: scale(0.98); }
        #info { margin-top: 20px; padding: 20px; border-radius: 15px; font-weight: bold; display: none; font-size: 1.2rem; }
        .success { background: #27ae60; border: 2px solid white; }
        .error { background: #c0392b; border: 2px solid white; }
        .used { background: #f39c12; border: 2px solid white; }
        h2 { letter-spacing: 2px; margin-bottom: 5px; }
        p { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="card">
        <h2>ART VITA</h2>
        <p>CONTROL DE ACCESO</p>

        <div id="login-area">
            <p style="margin-top:30px;">PIN de validador</p>
            <input type="password" id="pinInput" inputmode="numeric" maxlength="4" placeholder="****">
            <br>
            <button class="btn" onclick="login()">INGRESAR</button>
        </div>

        <div id="scanner-area" style="display:none;">
            <video id="video"></video>
            <div id="info">ESPERANDO QR...</div>
            <br><br>
            <button class="btn" onclick="location.reload()" style="background:none; color:white; border:1px solid white; padding: 10px 20px;">Cerrar Sesión</button>
        </div>
    </div>

    <script>
        // --- COLOCA AQUÍ TU URL DE GOOGLE APPS SCRIPT ---
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzSXdXyLPBCPvAZtrBfIhD5f00Q5ThZIrBaYGgA291J4Fub2PlXtc1TatXrVQwticPw/exec";
        
        let currentPin = "";
        let isScanning = false;
        const codeReader = new ZXing.BrowserQRCodeReader();

        function login() {
            const pin = document.getElementById("pinInput").value;
            if(!pin) return alert("Ingresa el PIN");

            // Verificamos el PIN con el servidor
            fetch(`${WEB_APP_URL}?pin=${pin}`)
                .then(r => r.json())
                .then(data => {
                    if (data.status === "auth_ok") {
                        currentPin = pin;
                        document.getElementById("login-area").style.display = "none";
                        document.getElementById("scanner-area").style.display = "block";
                        startCamera();
                    } else {
                        alert("PIN Incorrecto");
                        document.getElementById("pinInput").value = "";
                    }
                }).catch(e => alert("Error de conexión. Revisa internet o la URL del script."));
        }

        function startCamera() {
            const videoElem = document.getElementById("video");
            videoElem.style.display = "block";

            codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
                if (result && !isScanning) {
                    isScanning = true;
                    validarCodigo(result.text);
                }
            });
        }

        function validarCodigo(codigo) {
            const info = document.getElementById("info");
            info.style.display = "block";
            info.innerText = "VERIFICANDO...";
            info.className = "";

            fetch(`${WEB_APP_URL}?pin=${currentPin}&code=${codigo}`)
                .then(r => r.json())
                .then(data => {
                    if (data.status === "success") {
                        info.innerText = "✅ ACCESO: " + data.nombre;
                        info.className = "success";
                    } else if (data.status === "used") {
                        info.innerText = "❌ YA USADA: " + data.nombre;
                        info.className = "used";
                    } else {
                        info.innerText = "❌ CÓDIGO INVÁLIDO";
                        info.className = "error";
                    }
                    
                    // Esperar 3.5 segundos antes de permitir el siguiente escaneo
                    setTimeout(() => {
                        isScanning = false;
                        info.innerText = "ESPERANDO QR...";
                        info.className = "";
                    }, 3500);
                });
        }
    </script>
</body>
</html>
